<div class="relative inline-block font-sans">

  <button type="button" (click)="toggle()" [ngClass]="{
      'border-violet-600 ring-2 ring-violet-600/10': isOpen,
      'border-slate-200': !isOpen
    }"
    class="flex items-center justify-center gap-2 h-8 sm:h-9 px-2 sm:px-3 bg-white border rounded-lg cursor-pointer transition-all duration-200 hover:bg-slate-50 hover:border-slate-300 focus:outline-none 2xl:h-12 2xl:px-5">

    <span class="flex items-center gap-1.5">
      <span *ngIf="showIcon" class="inline-flex items-center justify-center text-slate-500">
        <div class="scale-90 sm:scale-100 2xl:scale-125">
          <ng-content select="[icon]"></ng-content>
        </div>
      </span>

      <span class="hidden sm:block text-xs md:text-sm font-medium text-slate-900 capitalize 2xl:text-lg">
        {{ label }}
      </span>
    </span>

    <span class="hidden sm:flex items-center text-slate-400 transition-transform duration-200"
      [class.rotate-180]="isOpen">
      <svg width="8" height="5" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 1L5 5L9 1" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </span>
  </button>

  <div *ngIf="isOpen"
    class="absolute top-[calc(100%+4px)] right-0 w-max min-w-[140px] p-1 bg-white border border-slate-200 rounded-lg shadow-lg z-[100] animate-in fade-in zoom-in duration-150 2xl:min-w-[220px]">

    <ng-container *ngFor="let option of options">
      <div *ngIf="option.isDivider" class="h-px my-1 bg-slate-100"></div>

      <button *ngIf="!option.isDivider" type="button" (click)="selectOption(option)" [ngClass]="option.value === selectedValue 
          ? 'bg-violet-50 text-violet-700 font-semibold' 
          : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'"
        class="flex items-center justify-between w-full px-2.5 py-1.5 text-[11px] sm:text-xs rounded md:rounded-md transition-colors 2xl:text-base 2xl:py-3">

        <span class="block whitespace-nowrap pr-4">{{ option.label }}</span>

        <svg *ngIf="option.value === selectedValue" class="w-3 h-3 text-violet-600 2xl:w-5 2xl:h-5" fill="currentColor"
          viewBox="0 0 20 20">
          <path fill-rule="evenodd"
            d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
            clip-rule="evenodd" />
        </svg>
      </button>
    </ng-container>
  </div>
</div>
