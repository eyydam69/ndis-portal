<app-dialog-ui [label]="label" [isOpen]="isOpen" (close)="closed.emit()">

  <div body class="space-y-4">
    <ng-content></ng-content>
  </div>

  <div actions class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
    <button (click)="closed.emit()"
      class="order-2 sm:order-1 px-4 py-2 text-[11px] sm:text-xs 2xl:text-xl border rounded-md font-semibold text-slate-500 hover:text-slate-700">
      Dismiss
    </button>

    <button (click)="confirmed.emit()"
      class="order-1 sm:order-2 px-6 py-2 bg-rose-600 text-white rounded-lg font-bold text-[11px] sm:text-xs 2xl:text-xl 4xl:text-3xl hover:bg-rose-700 shadow-md transition-all active:scale-95">
      {{ confirmText }}
    </button>
  </div>

</app-dialog-ui>
